<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prizma</title>
    <meta name="theme-color" content="#0f7b63" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="app-title">
        <div class="masthead">
          <p class="eyebrow">Prizma</p>
          <h1 id="app-title">Стилизация изображений</h1>
          <p class="lead">Загрузите изображение, выберите стиль и получите обработанный результат через backend-контур Prizma.</p>
        </div>

        <form id="job-form" class="uploader">
          <label class="dropzone" for="image-input">
            <span class="dropzone-title">Выберите изображение</span>
            <span id="file-name" class="dropzone-meta">PNG, JPEG или WebP до 10 МБ</span>
            <input id="image-input" name="file" type="file" accept="image/png,image/jpeg,image/webp" required />
          </label>

          <label class="field">
            <span>Стиль</span>
            <select id="style-select" name="style" required></select>
          </label>

          <button id="submit-button" type="submit">Запустить обработку</button>
        </form>

        <div class="status-line" role="status" aria-live="polite">
          <span id="status-dot" class="status-dot"></span>
          <span id="status-text">Проверяю API...</span>
        </div>

        <section class="preview" aria-label="Результат обработки">
          <div class="image-pane">
            <p id="empty-state">Результат появится здесь после обработки.</p>
            <img id="result-image" alt="Обработанное изображение" hidden />
          </div>
          <div id="result-actions" class="result-actions" hidden>
            <a id="download-link" class="secondary-action" href="#" download="prizma-result.png">Скачать результат</a>
            <button id="share-button" class="secondary-action" type="button">Поделиться</button>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js?v=20260603-2" type="module"></script>
  </body>
</html>
