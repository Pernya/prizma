name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  python:
    name: Python quality and security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Security gates
        run: make security

  mlops:
    name: MLOps gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run MLOps pipeline
        run: make mlops

      - name: Upload MLOps reports
        uses: actions/upload-artifact@v4
        with:
          name: mlops-reports
          path: |
            docs/mlops/model-card.md
            reports/mlops/*.json
            models/prizma_stylizer/metadata.json

  kubernetes:
    name: Helm and Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Install kubeconform
        run: |
          curl -sSL -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Helm lint
        run: helm lint charts/prizma

      - name: Validate manifests
        run: make kube-validate HELM=helm KUBECONFORM=kubeconform

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t prizma-backend:${{ github.sha }} .
