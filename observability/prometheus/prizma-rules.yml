groups:
  - name: prizma-slo
    rules:
      - alert: PrizmaHighErrorRate
        expr: sum(rate(prizma_http_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(prizma_http_requests_total[5m])), 1) > 0.01
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Prizma backend returns too many 5xx responses"

      - alert: PrizmaHighP95Latency
        expr: histogram_quantile(0.95, sum by (le) (rate(prizma_http_request_duration_seconds_bucket{path="/api/v1/jobs"}[5m]))) > 0.3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Prizma job creation API exceeds latency budget"

      - alert: PrizmaHighJobP95Duration
        expr: histogram_quantile(0.95, sum by (le) (rate(prizma_job_duration_seconds_bucket[5m]))) > 2.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Prizma image processing exceeds p95 duration SLO"

      - alert: PrizmaHighJobFailureRate
        expr: sum(rate(prizma_jobs_total{result="error"}[5m])) / clamp_min(sum(rate(prizma_jobs_total[5m])), 1) > 0.01
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Prizma worker job failure rate exceeds SLO"

      - alert: PrizmaJobsStuck
        expr: prizma_active_jobs > 10
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Too many active Prizma jobs for too long"
