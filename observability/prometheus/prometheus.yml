global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/prizma-rules.yml

scrape_configs:
  - job_name: prizma-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000

  - job_name: prizma-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:9100

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
