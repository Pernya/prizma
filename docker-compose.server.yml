services:
  frontend:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./deploy/regcloud/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    build:
      context: .
    restart: unless-stopped
    environment:
      PRIZMA_BASE_URL: http://prizma.pernyaev.ru
      PRIZMA_ENVIRONMENT: production
      PRIZMA_EXECUTION_MODE: broker
      PRIZMA_STORAGE_BACKEND: s3
      PRIZMA_INFERENCE_BACKEND: ${PRIZMA_INFERENCE_BACKEND:-local}
      PRIZMA_ARTIFACT_BUCKET: prizma-artifacts
      PRIZMA_S3_ENDPOINT_URL: http://minio:9000
      PRIZMA_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      PRIZMA_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      PRIZMA_RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-prizma}:${RABBITMQ_DEFAULT_PASS:-prizma}@rabbitmq:5672/%2f
      PRIZMA_RABBITMQ_QUEUE: prizma.jobs
      PRIZMA_JOB_STATE_DIR: /app/state/jobs
      PRIZMA_LOCAL_ARTIFACT_DIR: /app/state/local-artifacts
      PRIZMA_TRITON_URL: triton:8000
      PRIZMA_TRITON_MODEL_NAME: prizma_stylizer
    depends_on:
      minio-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    volumes:
      - shared-state:/app/state
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
    restart: unless-stopped
    command: ["python", "-m", "prizma_backend.worker"]
    environment:
      PRIZMA_BASE_URL: http://backend:8000
      PRIZMA_ENVIRONMENT: production
      PRIZMA_EXECUTION_MODE: broker
      PRIZMA_STORAGE_BACKEND: s3
      PRIZMA_INFERENCE_BACKEND: ${PRIZMA_INFERENCE_BACKEND:-local}
      PRIZMA_ARTIFACT_BUCKET: prizma-artifacts
      PRIZMA_S3_ENDPOINT_URL: http://minio:9000
      PRIZMA_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      PRIZMA_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      PRIZMA_RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-prizma}:${RABBITMQ_DEFAULT_PASS:-prizma}@rabbitmq:5672/%2f
      PRIZMA_RABBITMQ_QUEUE: prizma.jobs
      PRIZMA_JOB_STATE_DIR: /app/state/jobs
      PRIZMA_LOCAL_ARTIFACT_DIR: /app/state/local-artifacts
      PRIZMA_TRITON_URL: triton:8000
      PRIZMA_TRITON_MODEL_NAME: prizma_stylizer
      PRIZMA_WORKER_METRICS_PORT: 9100
    depends_on:
      minio-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    volumes:
      - shared-state:/app/state

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-05-21T01-59-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER:-minioadmin}" "$${MINIO_ROOT_PASSWORD:-minioadmin123}"
        mc mb --ignore-existing local/prizma-artifacts
        mc anonymous set download local/prizma-artifacts

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-prizma}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-prizma}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  minio-data:
  rabbitmq-data:
  shared-state:
