stages:
  - validate
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/prizma-backend"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

default:
  interruptible: true
  cache:
    paths:
      - .cache/pip

software:lint:
  stage: validate
  image: python:3.12-slim
  rules:
    - changes:
        - pyproject.toml
        - src/**/*
        - tests/**/*
  before_script:
    - pip install -e .[dev]
  script:
    - ruff check src tests
    - ruff format --check src tests

software:test:
  stage: validate
  image: python:3.12-slim
  rules:
    - changes:
        - pyproject.toml
        - src/**/*
        - tests/**/*
  before_script:
    - pip install -e .[dev]
  script:
    - pytest -q

software:dependency-scan:
  stage: validate
  image: python:3.12-slim
  rules:
    - changes:
        - pyproject.toml
        - src/**/*
  before_script:
    - pip install -e .[dev]
  script:
    - pip-audit --progress-spinner=off

infra:helm-lint:
  stage: validate
  image: alpine/helm:3.16.4
  rules:
    - changes:
        - charts/**/*
        - deploy/**/*
  script:
    - helm lint charts/prizma
    - helm template prizma charts/prizma -f charts/prizma/values-dev.yaml > rendered-dev.yaml
    - helm template prizma charts/prizma -f charts/prizma/values-eks.yaml > rendered-eks.yaml
  artifacts:
    paths:
      - rendered-dev.yaml
      - rendered-eks.yaml

infra:kubeconform:
  stage: validate
  image: ghcr.io/yannh/kubeconform:latest
  rules:
    - changes:
        - deploy/**/*
        - charts/**/*
  script:
    - kubeconform -strict -ignore-missing-schemas -summary deploy/k8s/observability/*.yaml

software:build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_BRANCH
  script:
    - mkdir -p /kaniko/.docker
    - >
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"$CI_REGISTRY":{"username":"$CI_REGISTRY_USER","password":"$CI_REGISTRY_PASSWORD"}}}
      EOF
    - >
      /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/Dockerfile"
      --destination "$IMAGE_NAME:$IMAGE_TAG"
      --destination "$IMAGE_NAME:latest"

deploy:dev:
  stage: deploy
  image: dtzar/helm-kubectl:3.16.2
  environment:
    name: dev
  needs:
    - software:build-image
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  script:
    - >
      helm upgrade --install prizma charts/prizma
      --namespace prizma
      --create-namespace
      -f charts/prizma/values-dev.yaml
      --set image.repository="$IMAGE_NAME"
      --set image.tag="$IMAGE_TAG"

deploy:prod:
  stage: deploy
  image: dtzar/helm-kubectl:3.16.2
  environment:
    name: production
  needs:
    - software:build-image
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
  script:
    - >
      helm upgrade --install prizma charts/prizma
      --namespace prizma
      --create-namespace
      -f charts/prizma/values-prod.yaml
      --set image.repository="$IMAGE_NAME"
      --set image.tag="$CI_COMMIT_TAG"
