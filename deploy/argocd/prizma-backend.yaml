apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prizma-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.example.com/group/prizma-platform.git
    targetRevision: main
    path: charts/prizma
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prizma
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
