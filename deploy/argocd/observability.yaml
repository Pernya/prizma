apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prizma-observability
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.example.com/group/prizma-platform.git
    targetRevision: main
    path: deploy/k8s/observability
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
