apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    rule_files:
      - /etc/prometheus/rules/prizma-rules.yml
    scrape_configs:
      - job_name: prizma-backend
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
  prizma-rules.yml: |
    groups:
      - name: prizma-slo
        rules:
          - alert: PrizmaHighErrorRate
            expr: sum(rate(prizma_http_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(prizma_http_requests_total[5m])), 1) > 0.02
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Prizma backend returns too many 5xx responses"
          - alert: PrizmaHighP95Latency
            expr: histogram_quantile(0.95, sum by (le) (rate(prizma_http_request_duration_seconds_bucket{path="/api/v1/jobs"}[5m]))) > 3
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Prizma job creation API exceeds latency budget"
          - alert: PrizmaJobsStuck
            expr: prizma_active_jobs > 10
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Too many active Prizma jobs for too long"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: default
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: observability
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
