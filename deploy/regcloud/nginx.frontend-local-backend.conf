server {
    listen 80;
    server_name prizma.pernyaev.ru;

    client_max_body_size 25m;
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $prizma_api_origin https://api.pernyaev.ru;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
        try_files $uri =404;
    }

    location ~* \.(js|css|svg)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass $prizma_api_origin$request_uri;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_ssl_server_name on;
        proxy_set_header Host api.pernyaev.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~ ^/(healthz|readyz|metrics|docs|openapi.json) {
        proxy_pass $prizma_api_origin;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_ssl_server_name on;
        proxy_set_header Host api.pernyaev.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
