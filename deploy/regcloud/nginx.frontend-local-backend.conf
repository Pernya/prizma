server {
    listen 80;
    server_name prizma.pernyaev.ru;

    client_max_body_size 25m;
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $prizma_api_origin https://api.prizma.pernyaev.ru;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass $prizma_api_origin/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host api.prizma.pernyaev.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~ ^/(healthz|readyz|metrics|docs|openapi.json) {
        proxy_pass $prizma_api_origin;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host api.prizma.pernyaev.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
