image:
  tag: stable

app:
  baseUrl: https://prizma.pernyaev.ru
  environment: production

serviceAccount:
  annotations: {}

api:
  replicaCount: 1
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    hosts:
      - host: prizma.pernyaev.ru
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: prizma-pernyaev-ru-tls
        hosts:
          - prizma.pernyaev.ru
  autoscaling:
    enabled: false
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

sharedState:
  size: 5Gi
  accessModes:
    - ReadWriteOnce

minio:
  persistence:
    enabled: true
    size: 20Gi

rabbitmq:
  persistence:
    enabled: true
    size: 10Gi

triton:
  enabled: false

serviceMonitor:
  enabled: true
