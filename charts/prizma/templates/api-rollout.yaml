{{- if .Values.rollouts.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "prizma.apiFullname" . }}
  labels:
    {{- include "prizma.labels" . | nindent 4 }}
    {{- include "prizma.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  strategy:
    canary:
      steps:
        {{- toYaml .Values.rollouts.canary.steps | nindent 8 }}
      {{- if .Values.rollouts.canary.analysis.enabled }}
      analysis:
        templates:
          - templateName: {{ include "prizma.apiFullname" . }}-analysis
      {{- end }}
  selector:
    matchLabels:
      {{- include "prizma.componentSelectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "prizma.componentSelectorLabels" (dict "root" . "component" "api") | nindent 8 }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- toYaml .Values.api.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "prizma.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PRIZMA_BASE_URL
              value: {{ .Values.app.baseUrl | quote }}
            - name: PRIZMA_ENVIRONMENT
              value: {{ .Values.app.environment | quote }}
            - name: PRIZMA_EXECUTION_MODE
              value: {{ .Values.app.executionMode | quote }}
            - name: PRIZMA_STORAGE_BACKEND
              value: {{ .Values.app.storageBackend | quote }}
            - name: PRIZMA_INFERENCE_BACKEND
              value: {{ .Values.app.inferenceBackend | quote }}
            - name: PRIZMA_ARTIFACT_BUCKET
              value: {{ .Values.minio.bucket | quote }}
            - name: PRIZMA_S3_ENDPOINT_URL
              value: "http://{{ include "prizma.minioFullname" . }}:{{ .Values.minio.service.apiPort }}"
            - name: PRIZMA_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "prizma.secretName" . }}
                  key: minio-root-user
            - name: PRIZMA_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "prizma.secretName" . }}
                  key: minio-root-password
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "prizma.secretName" . }}
                  key: rabbitmq-username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "prizma.secretName" . }}
                  key: rabbitmq-password
            - name: PRIZMA_RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USERNAME):$(RABBITMQ_PASSWORD)@{{ include "prizma.rabbitmqFullname" . }}:{{ .Values.rabbitmq.service.amqpPort }}/%2f"
            - name: PRIZMA_RABBITMQ_QUEUE
              value: {{ .Values.rabbitmq.queue | quote }}
            - name: PRIZMA_JOB_STATE_DIR
              value: /app/state/jobs
            - name: PRIZMA_LOCAL_ARTIFACT_DIR
              value: /app/state/local-artifacts
            - name: PRIZMA_MAX_UPLOAD_BYTES
              value: {{ .Values.app.maxUploadBytes | quote }}
            - name: PRIZMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "prizma.secretName" . }}
                  key: api-key
            - name: PRIZMA_RESULT_PUBLIC_BASE_URL
              value: {{ .Values.app.resultPublicBaseUrl | quote }}
            - name: PRIZMA_ARTIFACT_RETENTION_DAYS
              value: {{ .Values.app.artifactRetentionDays | quote }}
            - name: PRIZMA_TRITON_URL
              value: "{{ include "prizma.tritonFullname" . }}:{{ .Values.triton.httpPort }}"
            - name: PRIZMA_TRITON_MODEL_NAME
              value: {{ .Values.triton.modelName | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: shared-state
              mountPath: /app/state
      volumes:
        - name: shared-state
          {{- if .Values.sharedState.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "prizma.fullname" . }}-shared-state
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
